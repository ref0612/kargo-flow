[build]
  command = "npm run build"
  publish = "dist"
  functions = "dist/.netlify/functions"

[build.environment]
  NODE_VERSION = "20.11.0"
  NPM_VERSION = "10.0.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[context.production]
  command = "npm run build"
  environment = { NODE_ENV = "production" }

[context.develop]
  command = "npm run dev"
  environment = { NODE_ENV = "development" }

[context.deploy-preview]
  command = "npm run build"
  environment = { NODE_ENV = "production" }
